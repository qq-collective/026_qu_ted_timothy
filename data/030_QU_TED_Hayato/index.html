<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QQ30 — Logical X-Ray</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Crimson+Pro:ital,wght@0,300;0,600;1,300&display=swap');

  :root {
    --bg: #f0ede6;        /* 象牙 — グランドピアノのボディ */
    --paper: #fdfcfa;     /* 白鍵 */
    --ink: #111010;       /* 黒鍵 */
    --faint: #b8b4ac;     /* フェルト */
    --dedu: #1a1a1a;      /* 黒鍵（演繹） */
    --indu: #4a4a4a;      /* 黒鍵・ミッドトーン（帰納） */
    --abdu: #8a7560;      /* 木目・ペダル金（アブダクション） */
    --dedu-light: #e8e8e6;
    --indu-light: #ededeb;
    --abdu-light: #f0ece6;
    --accent: #9a8260;    /* ゴールドペダル */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Noto Serif JP', serif;
    min-height: 100vh;
    padding: 40px 20px 80px;
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    margin-bottom: 48px;
  }
  .kigo {
    font-family: 'Crimson Pro', serif;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--faint);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  h1 {
    font-size: clamp(22px, 5vw, 32px);
    font-weight: 300;
    letter-spacing: 2px;
    line-height: 1.4;
  }
  h1 span {
    display: block;
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 0.65em;
    color: var(--accent);
    letter-spacing: 1px;
    margin-top: 4px;
  }
  .hayato-intro {
    margin-top: 16px;
    font-size: 13px;
    color: var(--faint);
    font-weight: 300;
  }

  /* ── INPUT AREA ── */
  .input-section {
    max-width: 720px;
    margin: 0 auto 40px;
  }
  .input-label {
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 10px;
    display: block;
  }
  textarea {
    width: 100%;
    min-height: 120px;
    background: var(--paper);
    border: 1px solid var(--faint);
    border-radius: 4px;
    padding: 16px;
    font-family: 'Noto Serif JP', serif;
    font-size: 14px;
    color: var(--ink);
    resize: vertical;
    line-height: 1.8;
    transition: border-color 0.2s;
    outline: none;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--faint); }

  .api-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    align-items: center;
  }
  .api-row input {
    flex: 1;
    background: var(--paper);
    border: 1px solid var(--faint);
    border-radius: 4px;
    padding: 10px 14px;
    font-family: 'Noto Serif JP', serif;
    font-size: 13px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }
  .api-row input:focus { border-color: var(--accent); }

  .btn-analyze {
    background: var(--ink);
    color: var(--bg);
    border: none;
    border-radius: 4px;
    padding: 10px 28px;
    font-family: 'Noto Serif JP', serif;
    font-size: 13px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .btn-analyze:hover { background: var(--accent); }
  .btn-analyze:active { transform: scale(0.98); }
  .btn-analyze:disabled { background: var(--faint); cursor: not-allowed; }

  /* ── CARDS ── */
  .cards-grid {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }
  @media (max-width: 700px) {
    .cards-grid { grid-template-columns: 1fr; }
  }

  .card {
    background: var(--paper);
    border-radius: 6px;
    padding: 28px 24px;
    border-top: 3px solid var(--faint);
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.5s, transform 0.5s, border-color 0.2s, box-shadow 0.2s;
    cursor: pointer;
    position: relative;
  }
  .card.visible { opacity: 1; transform: translateY(0); }
  .card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }

  .card.dedu { border-top-color: var(--dedu); }
  .card.indu { border-top-color: var(--indu); }
  .card.abdu { border-top-color: var(--abdu); }

  .card.selected.dedu { background: var(--dedu-light); box-shadow: 0 0 0 2px var(--dedu); }
  .card.selected.indu { background: var(--indu-light); box-shadow: 0 0 0 2px var(--indu); }
  .card.selected.abdu { background: var(--abdu-light); box-shadow: 0 0 0 2px var(--abdu); }

  .card-type {
    font-family: 'Crimson Pro', serif;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .card.dedu .card-type { color: var(--dedu); }
  .card.indu .card-type { color: var(--indu); }
  .card.abdu .card-type { color: var(--abdu); }

  .card-name {
    font-size: 17px;
    font-weight: 400;
    letter-spacing: 1px;
    margin-bottom: 16px;
  }
  .card-body {
    font-size: 13px;
    line-height: 1.9;
    color: #3a3530;
    font-weight: 300;
    min-height: 80px;
  }

  .card-hint {
    margin-top: 20px;
    font-size: 11px;
    color: var(--faint);
    letter-spacing: 1px;
    text-align: right;
  }
  .card.selected .card-hint { color: var(--accent); }

  /* ── RESULT ── */
  .result-section {
    max-width: 720px;
    margin: 40px auto 0;
    text-align: center;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.5s, transform 0.5s;
  }
  .result-section.visible { opacity: 1; transform: translateY(0); }

  .result-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--faint);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .result-type {
    font-size: clamp(26px, 6vw, 40px);
    font-weight: 300;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .result-desc {
    font-size: 14px;
    color: #5a5248;
    line-height: 1.8;
    font-weight: 300;
    max-width: 480px;
    margin: 0 auto;
  }
  .hayato-comment {
    margin-top: 20px;
    padding: 16px 20px;
    background: var(--paper);
    border-radius: 4px;
    border-left: 2px solid var(--accent);
    font-size: 13px;
    line-height: 1.8;
    color: #4a4540;
    font-weight: 300;
    text-align: left;
  }
  .hayato-sig {
    margin-top: 8px;
    font-size: 11px;
    color: var(--faint);
    text-align: right;
    font-family: 'Crimson Pro', serif;
    font-style: italic;
  }

  /* ── LOADING ── */
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--faint);
    font-size: 13px;
    letter-spacing: 2px;
    display: none;
  }
  .loading.active { display: block; }
  .dot { animation: blink 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.3s; }
  .dot:nth-child(3) { animation-delay: 0.6s; }
  @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

  .error-msg {
    max-width: 720px;
    margin: 12px auto;
    padding: 12px 16px;
    background: #fff0f0;
    border: 1px solid #e0b0b0;
    border-radius: 4px;
    font-size: 13px;
    color: #8b3030;
    display: none;
  }
  .error-msg.active { display: block; }
</style>
</head>
<body>

<header>
  <div class="kigo">QuestQueries — #030</div>
  <h1>QQ30<span>Logical X-Ray</span></h1>
  <div class="hayato-intro">隼人が3つの声部で読み解く — どの音が聴こえましたか？</div>
</header>

<div class="input-section">
  <label class="input-label">論文の一節 or 主張を貼り付けてください</label>
  <textarea id="inputText" placeholder="例：人間の言語習得は、生得的な文法知識の存在を前提としなければ説明できない。子どもが短期間で複雑な文法を習得するという事実は、この仮説を強く支持している。"></textarea>

  <div class="api-row">
    <input type="password" id="apiKey" placeholder="Anthropic API Key（sk-ant-...）" />
    <button class="btn-analyze" id="analyzeBtn" onclick="analyze()">推論を分解する</button>
  </div>
</div>

<div class="error-msg" id="errorMsg"></div>
<div class="loading" id="loading">
  <span class="dot">●</span><span class="dot">●</span><span class="dot">●</span>
  <span style="margin-left:12px;">隼人が楽譜を読んでいます</span>
</div>

<div class="cards-grid" id="cardsGrid" style="display:none;">
  <div class="card dedu" id="card-dedu" onclick="selectCard('dedu')">
    <div class="card-type">Deduction</div>
    <div class="card-name">演繹的に読むと</div>
    <div class="card-body" id="text-dedu"></div>
    <div class="card-hint">← タップで選択</div>
  </div>
  <div class="card indu" id="card-indu" onclick="selectCard('indu')">
    <div class="card-type">Induction</div>
    <div class="card-name">帰納的に読むと</div>
    <div class="card-body" id="text-indu"></div>
    <div class="card-hint">← タップで選択</div>
  </div>
  <div class="card abdu" id="card-abdu" onclick="selectCard('abdu')">
    <div class="card-type">Abduction</div>
    <div class="card-name">アブダクション的に読むと</div>
    <div class="card-body" id="text-abdu"></div>
    <div class="card-hint">← タップで選択</div>
  </div>
</div>

<div class="result-section" id="resultSection">
  <div class="result-label">あなたの読み方は</div>
  <div class="result-type" id="resultType"></div>
  <div class="result-desc" id="resultDesc"></div>
  <div class="hayato-comment" id="hayatoComment"></div>
  <div class="hayato-sig">— 隼人</div>
</div>

<script>
const PROFILES = {
  dedu: {
    type: '戦士型の読み手',
    desc: 'ルールと結論のつながりを先に見る。論文の「前提は正しいか」を問い続けるクリティカルな読み方。',
    comment: '演繹を選んだということは、あなたはこの文章の「論理の骨格」を先に見ようとしている。前提が崩れたら全部崩れる——そのことをよく知っている。'
  },
  indu: {
    type: '僧侶型の読み手',
    desc: '事例や証拠の積み重ねを丁寧に確認する。「本当にそう言えるの？」を繰り返す慎重な読み方。',
    comment: '帰納を選んだということは、あなたはデータや事例が語ることを信じたい人だ。でも帰納には必ず「飛躍」がある——そのギャップが見えたとき、論文の核心が見えてくる。'
  },
  abdu: {
    type: '魔法使い型の読み手',
    desc: '「なぜこういう結論になったのか」を著者の動機ごと想像する。文脈を読む直感的な読み方。',
    comment: 'アブダクションを選んだということは、あなたは「著者が何を発見しようとしていたか」を読もうとしている。それは論文の一番おもしろいところだ。'
  }
};

let currentResult = null;

async function analyze() {
  const text = document.getElementById('inputText').value.trim();
  const key = document.getElementById('apiKey').value.trim();

  if (!text) { showError('テキストを入力してください。'); return; }
  if (!key || !key.startsWith('sk-')) { showError('APIキーを確認してください。'); return; }

  hideError();
  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('cardsGrid').style.display = 'none';
  document.getElementById('resultSection').classList.remove('visible');
  document.getElementById('loading').classList.add('active');

  ['dedu','indu','abdu'].forEach(t => {
    document.getElementById('card-'+t).classList.remove('selected','visible');
  });

  const systemPrompt = `あなたは論理学と認識論に精通した学術コーチです。
ユーザーが貼り付けた論文の一節や主張を、3つの推論方式で分解してください。

以下のJSON形式のみで返答してください（マークダウン不要、前置きなし）：
{
  "dedu": "演繹的解釈（ルール→事例→結論の流れで説明。著者がどんな普遍的ルールを前提にしているか）",
  "indu": "帰納的解釈（複数の事例や観察から一般論を導こうとしているか。サンプルの妥当性は？）",
  "abdu": "アブダクション的解釈（著者がこの主張に至った仮説・動機・背景の推測。最もありそうな説明は？）"
}

各200字以内。平易な日本語で。`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: 'user', content: text }]
      })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    const raw = data.content[0].text;
    const match = raw.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('レスポンスの解析に失敗しました。');
    const parsed = JSON.parse(match[0]);

    currentResult = parsed;
    document.getElementById('text-dedu').textContent = parsed.dedu;
    document.getElementById('text-indu').textContent = parsed.indu;
    document.getElementById('text-abdu').textContent = parsed.abdu;

    document.getElementById('loading').classList.remove('active');
    document.getElementById('cardsGrid').style.display = 'grid';

    setTimeout(() => {
      ['dedu','indu','abdu'].forEach((t, i) => {
        setTimeout(() => document.getElementById('card-'+t).classList.add('visible'), i * 150);
      });
    }, 50);

  } catch(e) {
    showError('エラー: ' + e.message);
    document.getElementById('loading').classList.remove('active');
  }

  document.getElementById('analyzeBtn').disabled = false;
}

function selectCard(type) {
  ['dedu','indu','abdu'].forEach(t => document.getElementById('card-'+t).classList.remove('selected'));
  document.getElementById('card-'+type).classList.add('selected');

  const p = PROFILES[type];
  document.getElementById('resultType').textContent = p.type;
  document.getElementById('resultDesc').textContent = p.desc;
  document.getElementById('hayatoComment').textContent = p.comment;

  const rs = document.getElementById('resultSection');
  rs.classList.remove('visible');
  setTimeout(() => rs.classList.add('visible'), 50);
  rs.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('active');
}
function hideError() {
  document.getElementById('errorMsg').classList.remove('active');
}
</script>
</body>
</html>
